<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BeautyPicks</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="skin-care.png">
  <link rel="dns-prefetch" href="https://flourisheg.com">
  <link rel="dns-prefetch" href="https://www.actiherb.com">
  <link rel="dns-prefetch" href="https://balancehaircare.me">
  <link rel="dns-prefetch" href="https://bashrety.tv">
  <link rel="dns-prefetch" href="https://infinityclinicpharma.com">
  <link rel="dns-prefetch" href="https://chibiosilkegypt.com">
  <link rel="dns-prefetch" href="https://www.tribucare.com">
  <style>
    .skel-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      min-height: 100dvh;
      background: linear-gradient(180deg, oklch(0.985 0.008 150) 0%, oklch(0.96 0.015 155) 100%);
      background-attachment: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .skel-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(0,0,0,0.06);
      margin-bottom: 12px;
    }
    .skel-name {
      width: 160px;
      height: 28px;
      border-radius: 6px;
      background: rgba(0,0,0,0.08);
      margin-bottom: 8px;
    }
    .skel-tagline {
      width: 240px;
      height: 16px;
      border-radius: 4px;
      background: rgba(0,0,0,0.05);
      margin-bottom: 40px;
    }
    .skel-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 576px;
    }
    .skel-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: oklch(0.99 0.005 150);
      border: 1px solid oklch(0.88 0.02 155);
      border-radius: 16px;
      box-shadow: 0 8px 32px -12px oklch(0.4 0.06 155 / 0.2);
    }
    .skel-card-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .skel-card-title {
      width: 60%;
      height: 16px;
      border-radius: 4px;
      background: rgba(0,0,0,0.07);
    }
    .skel-card-desc {
      width: 80%;
      height: 12px;
      border-radius: 4px;
      background: rgba(0,0,0,0.04);
    }
    .skel-card-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.05);
      flex-shrink: 0;
    }
    @media (min-width: 640px) {
      .skel-page { padding-top: 64px; padding-bottom: 80px; }
    }
  </style>
</head>
<body>
  <app-root>
    <div class="skel-page">
      <div class="skel-avatar"></div>
      <div class="skel-name"></div>
      <div class="skel-tagline"></div>
      <div class="skel-links">
        <div class="skel-card">
          <div class="skel-card-content">
            <div class="skel-card-title"></div>
            <div class="skel-card-desc"></div>
          </div>
          <div class="skel-card-arrow"></div>
        </div>
        <div class="skel-card">
          <div class="skel-card-content">
            <div class="skel-card-title"></div>
            <div class="skel-card-desc"></div>
          </div>
          <div class="skel-card-arrow"></div>
        </div>
        <div class="skel-card">
          <div class="skel-card-content">
            <div class="skel-card-title"></div>
            <div class="skel-card-desc"></div>
          </div>
          <div class="skel-card-arrow"></div>
        </div>
      </div>
    </div>
  </app-root>
</body>
</html>
